# nginx server for 2ls.tech (see Dockerfile). Serves the files under public/ —
# a single static page plus whatever assets join it later. No build step, no
# SPA routing: a request maps directly to a file on disk.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # The page changes in place under the same name, so don't let browsers
    # cache HTML hard. Extension-less polish: /foo serves foo.html if present.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri.html $uri/ =404;
    }

    # Stock mime.types predates .webmanifest; give just that file its type
    # (an empty types{} here keeps the global map untouched).
    location = /site.webmanifest {
        types {}
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Simple health check endpoint for the k8s probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
